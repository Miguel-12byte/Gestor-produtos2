<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estoque App</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr"></script>

  <link rel="stylesheet" href="style.css">
</head>

<body class="bg-gray-900 text-white p-4">

  <!-- LOGIN -->
  <div id="loginBox" class="max-w-sm mx-auto">
    <h1 class="text-xl mb-4">Login</h1>
    <input id="email" class="input" placeholder="Email">
    <input id="password" type="password" class="input mt-2" placeholder="Senha">
    <button onclick="login()" class="btn mt-3 w-full">Entrar</button>
  </div>

  <!-- APP -->
  <div id="app" class="hidden">
    <h1 class="text-xl mb-3">Produtos</h1>

    <button onclick="startCamera()" class="btn mb-3">Abrir Scanner</button>

    <video id="video" class="w-full hidden"></video>

    <input id="name" class="input mt-2" placeholder="Nome">
    <input id="price" type="number" class="input mt-2" placeholder="Preço">

    <button onclick="saveProduct()" class="btn mt-3">Salvar</button>

    <div id="list" class="mt-4"></div>
  </div>

  <script type="module" src="firebase.js"></script>
  <script type="module" src="app.js"></script>

</body>
</html>
